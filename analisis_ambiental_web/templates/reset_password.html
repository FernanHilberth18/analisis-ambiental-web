<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña | Observatorio ambiental</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-body">
    <main class="auth-reset-shell">
        <section class="auth-card">
            <span class="seccion-label">Cuenta</span>
            <h1>Restablecer contraseña</h1>

            {% if mensaje %}
                <p class="comentario-mensaje">{{ mensaje }}</p>
            {% endif %}

            <form action="{{ url_for('restablecer_password', token=token) }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label>Nueva contraseña <input type="password" name="password" minlength="8" required></label>
                <label>Confirmar contraseña <input type="password" name="password_confirmacion" minlength="8" required></label>
                <button type="submit">Cambiar contraseña</button>
            </form>
        </section>
    </main>
</body>
</html>
